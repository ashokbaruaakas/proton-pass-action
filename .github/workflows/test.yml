name: "✅ Run Proton Pass Action Tests"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  integration-test:
    name: "Integration Test (Proton Pass Fetch)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v7

      - name: Fetch test secret via local action
        uses: ./
        with:
          proton_pat: ${{ secrets.PROTON_PAT }}
          secrets_map: |
            TEST_SECRET=pass://TestVault/TEST/TEST_SECRET
            TEST_MULTILINE_SECRET=pass://TestVault/TEST/TEST_MULTILINE_SECRET

      - name: Assert fetched secret values
        shell: bash
        run: |
          EXPECTED_TEST_SECRET="Don't Share This TEST Secret VAL"
          EXPECTED_MULTILINE_TEST_SECRET=$'-----BEGIN OPENSSH PRIVATE KEY-----\nline-one-test\nline-two-test+/=\n-----END OPENSSH PRIVATE KEY-----'

          if [ -z "${TEST_SECRET:-}" ]; then
            echo "❌ Error: TEST_SECRET was not populated in GITHUB_ENV."
            exit 1
          fi

          if [ "$TEST_SECRET" != "$EXPECTED_TEST_SECRET" ]; then
            echo "❌ Error: TEST_SECRET value did not match expected test vault value."
            exit 1
          fi

          if [ -z "${TEST_MULTILINE_SECRET:-}" ]; then
            echo "❌ Error: TEST_MULTILINE_SECRET was not populated in GITHUB_ENV."
            exit 1
          fi

          if [ "$TEST_MULTILINE_SECRET" != "$EXPECTED_MULTILINE_TEST_SECRET" ]; then
            echo "❌ Error: TEST_MULTILINE_SECRET did not preserve expected multiline content."
            exit 1
          fi

          echo "✅ Integration checks passed: single-line and multiline secrets resolved correctly."
