name: "🚀 Publish Production Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version to release (e.g., 1.0.1, 2.0.0)"
        required: true
        type: string

jobs:
  release:
    name: "Build, Tag, and Deploy Market Version"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code Engine
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Fetches full history so git can trace previous version targets

      - name: Validate Action Schema Syntax
        run: |
          echo "Checking action core structures..."
          if [ ! -f "action.yml" ]; then
            echo "❌ Error: Missing core action.yml definition file."
            exit 1
          fi
          echo "✅ action.yml validated successfully."

      - name: Configure Git Author Metadata
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate Dynamic SemVer Tags Locally
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          VERSION_TAG="v${RAW_VERSION}"
          MAJOR_VERSION="v${RAW_VERSION%%.*}"

          echo "Targeting specific version tag: $VERSION_TAG"
          echo "Calculated dynamic major version: $MAJOR_VERSION"

          PREVIOUS_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || echo "")
          echo "Determined historical baseline tag: $PREVIOUS_TAG"

          # Create and force-override localized Git tag tracking blocks
          git tag -fa "$VERSION_TAG" -m "Automated release $VERSION_TAG"
          git tag -fa "$MAJOR_VERSION" -m "Moving major version pointer to $VERSION_TAG"

          # Export tracking parameters down to subsequent environment runners
          echo "VERSION_TAG=$VERSION_TAG" >> $GITHUB_ENV
          echo "MAJOR_VERSION=$MAJOR_VERSION" >> $GITHUB_ENV
          echo "PREVIOUS_TAG=$PREVIOUS_TAG" >> $GITHUB_ENV

      - name: Publish Official GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Deploying official release asset metadata..."

          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Building notes with explicit boundary target: $PREVIOUS_TAG"
            gh release create "$VERSION_TAG" \
              --notes-start-tag "$PREVIOUS_TAG" \
              --generate-notes \
              --target main
          else
            gh release create "$VERSION_TAG" \
              --generate-notes \
              --target main
          fi

      - name: Sync and Propagating Moving Version Pointers
        run: |
          echo "Pushing moving tags to synchronize tracking repositories..."
          git push origin "$VERSION_TAG" --force
          git push origin "$MAJOR_VERSION" --force
          echo "🎉 System successfully synced to $VERSION_TAG and dynamic major alias @$MAJOR_VERSION!"
